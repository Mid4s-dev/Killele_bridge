build:
  docker:
    web: Dockerfile
  config:
    # Baked into the Next.js JS bundle at image-build time.
    # Same-origin serving means /api/v1 resolves to the same dyno.
    NEXT_PUBLIC_API_URL: /api/v1

release:
  # Runs inside a fresh copy of the web image before the dyno restarts.
  # Applies any pending Alembic migrations against the production database.
  image: web
  command:
    - /app/release.sh

run:
  web: gunicorn app.main:app
    --worker-class uvicorn.workers.UvicornWorker
    --workers ${WEB_CONCURRENCY:-1}
    --bind 0.0.0.0:${PORT:-8000}
    --timeout 120
    --keep-alive 5
    --log-level info
    --access-logfile -
