build:
  docker:
    web: Dockerfile
  config:
    # These ARGs are baked into the Next.js static bundle at build time.
    # NEXT_PUBLIC_API_URL: /api/v1 means all fetch() calls resolve to the
    # same Heroku dyno — no absolute URL, no CORS issues.
    #
    # Note: The frontend fetches the live registration fee from GET /api/v1/config
    # on page load, so the fee displayed is always current.
    NEXT_PUBLIC_API_URL: /api/v1

release:
  # Runs inside the web image before the dyno starts.
  # Applies any pending Alembic schema migrations.
  image: web
  command:
    - /app/release.sh

run:
  web: >-
    gunicorn app.main:app
    --worker-class uvicorn.workers.UvicornWorker
    --workers 1
    --bind 0.0.0.0:$PORT
    --timeout 120
    --keep-alive 5
    --log-level info
    --access-logfile -
