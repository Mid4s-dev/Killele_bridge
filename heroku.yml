build:
  docker:
    web: Dockerfile
  config:
    # These ARGs are baked into the Next.js static bundle at build time.
    # NEXT_PUBLIC_API_URL: /api/v1 means all fetch() calls resolve to the
    # same Heroku dyno — no absolute URL, no CORS issues.
    #
    # NEXT_PUBLIC_REGISTRATION_FEE_KES is the *build-time fallback* only.
    # The frontend fetches the live value from GET /api/v1/config on every
    # page load, so changing REGISTRATION_FEE_KES on the server takes
    # effect immediately without a rebuild.
    NEXT_PUBLIC_API_URL: /api/v1
    NEXT_PUBLIC_REGISTRATION_FEE_KES: "100"

release:
  # Runs inside the web image before the dyno starts.
  # Applies any pending Alembic schema migrations.
  image: web
  command:
    - /app/release.sh

run:
  web: >-
    gunicorn app.main:app
    --worker-class uvicorn.workers.UvicornWorker
    --workers 1
    --bind 0.0.0.0:$PORT
    --timeout 120
    --keep-alive 5
    --log-level info
    --access-logfile -
